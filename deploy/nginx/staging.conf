# Example Nginx staging reverse proxy.
# Keep both upstream apps bound to 127.0.0.1 only.

upstream culi_storefront_staging {
  server 127.0.0.1:3000;
}

upstream culi_admin_staging {
  server 127.0.0.1:3001;
}

server {
  listen 80;
  server_name staging.example.com;
  location / {
    proxy_pass http://culi_storefront_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}

server {
  listen 80;
  server_name admin-staging.example.com;
  location / {
    proxy_pass http://culi_admin_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}
