# Production TLS reverse proxy template.
# Replace mapping placeholders before enabling:
# - __STOREFRONT_DOMAIN__
# - __ADMIN_DOMAIN__
# - __STOREFRONT_CERT__
# - __STOREFRONT_KEY__
# - __ADMIN_CERT__
# - __ADMIN_KEY__
# Keep both upstream apps bound to 127.0.0.1 only.

upstream culi_storefront_production {
  server 127.0.0.1:3000;
}

upstream culi_admin_production {
  server 127.0.0.1:3001;
}

server {
  listen 80;
  server_name __STOREFRONT_DOMAIN__ __ADMIN_DOMAIN__;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name __STOREFRONT_DOMAIN__;
  ssl_certificate __STOREFRONT_CERT__;
  ssl_certificate_key __STOREFRONT_KEY__;

  location / {
    proxy_pass http://culi_storefront_production;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}

server {
  listen 443 ssl http2;
  server_name __ADMIN_DOMAIN__;
  ssl_certificate __ADMIN_CERT__;
  ssl_certificate_key __ADMIN_KEY__;

  location / {
    proxy_pass http://culi_admin_production;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}
