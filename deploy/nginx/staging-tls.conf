# Staging domains bound to this VPS public IP via sslip.io.
# Storefront: https://staging.45.77.32.128.sslip.io
# Admin:      https://admin-staging.45.77.32.128.sslip.io

upstream culi_storefront_staging {
  server 127.0.0.1:3000;
}

upstream culi_admin_staging {
  server 127.0.0.1:3001;
}

server {
  listen 80;
  server_name staging.45.77.32.128.sslip.io admin-staging.45.77.32.128.sslip.io;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name staging.45.77.32.128.sslip.io;
  ssl_certificate /etc/ssl/culi/staging.fullchain.pem;
  ssl_certificate_key /etc/ssl/culi/staging.key.pem;

  location / {
    proxy_pass http://culi_storefront_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}

server {
  listen 443 ssl http2;
  server_name admin-staging.45.77.32.128.sslip.io;
  ssl_certificate /etc/ssl/culi/admin-staging.fullchain.pem;
  ssl_certificate_key /etc/ssl/culi/admin-staging.key.pem;

  location / {
    proxy_pass http://culi_admin_staging;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }
}
